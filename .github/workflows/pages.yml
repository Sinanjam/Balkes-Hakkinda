name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: GitHub Pages'i hazırla
        uses: actions/configure-pages@v5

      - name: Site paketini yükle
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

      - name: Siteyi yayımla
        id: deployment
        uses: actions/deploy-pages@v4
